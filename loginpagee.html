<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Bookstore</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            color: #333;
            background: #f0f0f5;
        }

        .split-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .image-half {
            flex: 1;
            position: relative;
            background-image: url('Images/table.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, rgba(118,75,162,0.8), rgba(58,24,97,0.8));
            z-index: 1;
        }

        .welcome-text {
            position: relative;
            z-index: 2;
            max-width: 300px;
            text-align: center;
            font-weight: 700;
            font-size: 2.5em;
            letter-spacing: 2px;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .form-half {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f9f9f9;
            padding: 20px;
        }

        .container {
            background: #fff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            width: 320px;
            max-width: 90%;
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 35px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            color: #4b0082;
            letter-spacing: 1.5px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #764ba2;
            outline: none;
            box-shadow: 0 0 8px rgba(118, 75, 162, 0.5);
        }

        .input-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #764ba2;
            cursor: pointer;
            font-size: 1.2em;
            user-select: none;
        }

        .error {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: -15px;
            margin-bottom: 15px;
            font-weight: 600;
            min-height: 18px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #764ba2;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: #5a357a;
            transform: scale(1.05);
        }

        .success-message {
            color: #27ae60;
            text-align: center;
            margin-top: 20px;
            font-weight: 700;
            font-size: 1em;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95em;
        }

        .register-link a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #5a357a;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
            }
            .image-half, .form-half {
                flex: none;
                width: 100%;
                height: 50vh;
            }
            .container {
                width: 90%;
                padding: 30px 20px;
            }
            .welcome-text {
                font-size: 2em;
                max-width: 90%;
                padding: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <div class="image-half">
            <div class="image-overlay"></div>
            <div class="welcome-text">
                Login to Your Account
            </div>
        </div>
        <div class="form-half">
            <div class="container">
                <h2>Login to Your Account</h2>
                <form id="loginForm" novalidate>
                    <label for="email">Email</label>
                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder="Enter your email" required />
                        <i class="fa fa-envelope input-icon"></i>
                    </div>
                    <div class="error" id="emailError"></div>

                    <label for="password">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required />
                        <i class="fa fa-eye input-icon" id="togglePassword" title="Show/Hide Password"></i>
                    </div>
                    <div class="error" id="passwordError"></div>

                    <button type="submit">Login</button>
                </form>
                <div class="success-message" id="successMessage"></div>
                <div class="register-link">
                    Don't have an account? <a href="register_page.html">Register here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getUsers() {
            const users = localStorage.getItem('users');
            return users ? JSON.parse(users) : [];
        }

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // Clear previous errors and messages
            document.getElementById('emailError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('successMessage').textContent = '';

            let isValid = true;

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Email validation
            if (email === '') {
                document.getElementById('emailError').textContent = 'Email is required.';
                isValid = false;
            } else {
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    document.getElementById('emailError').textContent = 'Please enter a valid email address.';
                    isValid = false;
                }
            }

            // Password validation
            if (password === '') {
                document.getElementById('passwordError').textContent = 'Password is required.';
                isValid = false;
            }

            if (!isValid) {
                return;
            }

            // Check if user exists and password matches
            const users = getUsers();
            const user = users.find(u => u.email === email);

            if (!user) {
                document.getElementById('emailError').textContent = 'No account found with this email.';
                return;
            }

            if (user.password !== password) {
                document.getElementById('passwordError').textContent = 'Incorrect password.';
                return;
            }

            // Successful login
            document.getElementById('successMessage').textContent = 'Login successful!';
            this.reset();
        });

        // Show/hide password toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
